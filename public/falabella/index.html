<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosistema Falabella Directo | Recibelo</title>
<style>
:root{
  --green:#00a650;--green-l:#e8f7ef;--green-d:#007a3d;
  --purple:#7c3aed;--purple-l:#f3eeff;
  --navy:#0f172a;--text:#1e293b;--muted:#64748b;
  --bg:#f8fafc;--white:#fff;--border:#e2e8f0;
  --red:#ef4444;--red-l:#fef2f2;
  --amber:#f59e0b;--amber-l:#fffbeb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-brand{display:flex;align-items:center;gap:14px}
.logo{height:30px;object-fit:contain}
.hdr-sep{width:1px;height:26px;background:var(--border)}
.hdr-title{font-size:15px;font-weight:800;color:var(--navy)}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px}
.fala-badge{background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
.powered{font-size:12px;color:var(--muted)}
.powered strong{color:var(--purple)}

/* TABS */
.tab-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex}
.tab-btn{padding:13px 22px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* LAYOUT */
.wizard-wrap{display:flex;min-height:calc(100vh - 118px - 62px)}
.sidebar{width:250px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:118px;height:calc(100vh - 118px - 62px);overflow-y:auto}
.sidebar-ttl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding:0 6px}
.snav{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px}
.snav:hover{background:var(--bg)}
.snav.active{background:var(--green-l)}
.snav.done .snum{background:var(--green);color:#fff}
.snav.active .snum{background:var(--green);color:#fff}
.snum{width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.snav.done .snum::after{content:''}
.slabel{font-size:12px;color:var(--muted);line-height:1.3}
.snav.active .slabel{color:var(--green-d);font-weight:600}
.snav.done .slabel{color:var(--text)}

/* CONTENT */
.step-col{flex:1;padding:28px 32px}
.prog-wrap{background:var(--border);border-radius:99px;height:4px;margin-bottom:6px}
.prog-fill{background:var(--green);height:100%;border-radius:99px;transition:width .4s}
.prog-lbl{font-size:11px;color:var(--muted);margin-bottom:22px}

/* STEP CARD */
.scard{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:36px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.sico{font-size:44px;display:block;margin-bottom:14px}
.stag{display:inline-block;background:var(--green-l);color:var(--green-d);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px}
.stitle{font-size:24px;font-weight:800;color:var(--navy);line-height:1.2;margin-bottom:8px}
.ssub{font-size:14px;color:var(--muted);margin-bottom:26px;line-height:1.55}
.sec-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:24px 0 10px}
.sep{height:1px;background:var(--border);margin:22px 0}

/* CARDS ROW */
.cards3{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px}
.mc-ico{font-size:26px;margin-bottom:8px}
.mc-t{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:5px}
.mc-d{font-size:12px;color:var(--muted);line-height:1.45}

/* CHECKLISTS */
.cklist{list-style:none;display:flex;flex-direction:column;gap:8px}
.cklist li{display:flex;gap:10px;font-size:13px;line-height:1.45}
.cklist li::before{content:'✅';flex-shrink:0;font-size:14px}
.cklist.warn li::before{content:'⚠️'}
.cklist.info li::before{content:'ℹ️'}
.cklist.num{counter-reset:nc}
.cklist.num li{counter-increment:nc}
.cklist.num li::before{content:counter(nc);width:22px;height:22px;background:var(--green);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.cklist.num li.hi::before{background:var(--purple)}
.cklist.num li.hi{font-weight:700;color:var(--purple)}

/* ALERTS */
.alert{border-radius:10px;padding:14px 18px;display:flex;gap:12px;align-items:flex-start;margin:16px 0}
.alert-r{background:var(--red-l);border:1px solid #fca5a5}
.alert-g{background:var(--green-l);border:1px solid #86efac}
.alert-a{background:var(--amber-l);border:1px solid #fcd34d}
.alert-p{background:var(--purple-l);border:1px solid #c4b5fd}
.alert-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.alert-body{font-size:13px;line-height:1.5}
.alert-body strong{display:block;margin-bottom:3px;font-size:13px;font-weight:700}

/* FLOW */
.flow{display:flex;align-items:center;overflow-x:auto;padding-bottom:6px;margin:16px 0;gap:0}
.fstep{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;min-width:110px;flex-shrink:0}
.fstep .fi{font-size:22px;margin-bottom:5px}
.fstep .fl{font-size:11px;font-weight:600;color:var(--text);line-height:1.3}
.farrow{color:var(--muted);font-size:16px;padding:0 4px;flex-shrink:0}

/* BIG STAT */
.bigstat{text-align:center;background:var(--green-l);border:2px solid var(--green);border-radius:14px;padding:22px;margin:18px 0}
.bigstat .bn{font-size:52px;font-weight:900;color:var(--green);line-height:1}
.bigstat .bl{font-size:15px;font-weight:700;color:var(--navy);margin-top:6px}
.bigstat .bs{font-size:12px;color:var(--muted);margin-top:3px}

/* STARS TABLE */
.stbl{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;border-radius:10px;overflow:hidden}
.stbl th{background:var(--navy);color:#fff;padding:10px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.stbl td{padding:10px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
.stbl tr.hi td{background:var(--green-l);font-weight:600}
.stbl tr:last-child td{border-bottom:none}
.stars{color:#f59e0b;font-size:15px;letter-spacing:-1px}

/* INDICATORS */
.inds{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:14px 0}
.ind{border-radius:10px;padding:14px;border:1px solid var(--border);background:var(--bg)}
.ind.crit{border-color:var(--red);background:var(--red-l)}
.ind-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px}
.ind.crit .ind-lbl{color:var(--red)}
.ind-t{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px}
.ind-d{font-size:12px;color:var(--muted);line-height:1.4}

/* TAGS */
.tag-g{background:var(--green-l);color:var(--green-d);border:1px solid #86efac;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.tag-r{background:var(--red-l);color:var(--red);border:1px solid #fca5a5;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.tag-p{background:var(--purple-l);color:var(--purple);border:1px solid #c4b5fd;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;display:inline-block;margin:2px}

/* FOOTER NAV */
.nav-ft{background:var(--white);border-top:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:14px;position:sticky;bottom:0;z-index:99}
.btn-n{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-prev{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-prev:hover{background:var(--border)}
.btn-next{background:var(--green);color:#fff}
.btn-next:hover{background:var(--green-d)}
.btn-n:disabled{opacity:.35;cursor:default;pointer-events:none}
.nav-info{flex:1;text-align:center;font-size:12px;color:var(--muted);font-weight:500}

/* MOBILE */
@media(max-width:768px){
  .sidebar{display:none}
  .step-col{padding:14px}
  .scard{padding:20px}
  .cards3{grid-template-columns:1fr}
  .stitle{font-size:20px}
  .tab-btn{padding:12px 14px;font-size:12px}
  .nav-ft{padding:12px 14px}
  .hdr{padding:12px 16px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-brand">
    <img src="../recibelo.cl2.png" alt="Recibelo" class="logo" onerror="this.style.display='none'">
    <div class="hdr-sep"></div>
    <div>
      <div class="hdr-title">Ecosistema <span class="fala-badge">Falabella Directo</span></div>
      <div class="hdr-sub">Guia operativa completa para sellers</div>
    </div>
  </div>
  <div class="powered">Powered by <strong>Recibelo</strong></div>
</header>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-nuevo" onclick="switchWizard('nuevo')">Nuevo en Falabella Directo</button>
  <button class="tab-btn" id="tab-cambio" onclick="switchWizard('cambio')">Cambio de Courier</button>
</div>

<!-- WIZARD -->
<div class="wizard-wrap">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="step-col">
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
    <div class="prog-lbl" id="prog-lbl"></div>
    <div id="step-area"></div>
  </div>
</div>

<!-- NAV FOOTER -->
<footer class="nav-ft">
  <button class="btn-n btn-prev" id="btn-prev" onclick="changeStep(-1)">Anterior</button>
  <div class="nav-info" id="nav-info"></div>
  <button class="btn-n btn-next" id="btn-next" onclick="changeStep(1)">Siguiente</button>
</footer>

<script>
// ─── STEP DATA ──────────────────────────────────────────────────────────────

const STEPS_NUEVO = [
{
  tag:'Paso 1 de 6',
  icon:'',
  title:'Bienvenido al modelo mas directo de Falabella',
  sub:'Vende más. Entrega mejor. Sin intermediarios. Tu producto llega al cliente final con la infraestructura logística de Recibelo y la vitrina del marketplace más grande de Chile.',
  html:`
  <div class="cards3">
    <div class="mc"><div class="mc-ico"></div><div class="mc-t">Tu Operacion</div><div class="mc-d">Tu preparas, tu controlas el stock, tu defines la capacidad diaria.</div></div>
    <div class="mc"><div class="mc-ico"></div><div class="mc-t">Recibelo</div><div class="mc-d">El puente logistico. Retira en tu bodega y entrega al cliente final en la RM.</div></div>
    <div class="mc"><div class="mc-ico"></div><div class="mc-t">Falabella.com</div><div class="mc-d">El marketplace. Millones de compradores activos. Tu catálogo en primera fila.</div></div>

  <div class="sec-lbl">Que ganas con este modelo</div>
  <ul class="cklist">
    <li>Sincronización automática de inventario con Falabella , sin desincronizaciones manuales</li>
    <li>Rastreo en tiempo real para el comprador (estados automaticos via API)</li>
    <li>Tarifas preferenciales de envio gracias a la alianza estrategica Recibelo-Falabella</li>
    <li>Seguro de carga incluido en cada despacho</li>
    <li>Logística inversa unificada, devoluciones gestiónadas por Recibelo</li>
    <li>Soporte directo con ejecutivos especializados del modelo Directo</li>

  <div class="alert alert-g">
    <div class="alert-ico"></div>
    <div class="alert-body"><strong>El modelo Directo es distinto al modelo estándar</strong>Tú envías directamente desde tu bodega al cliente. No pasas por centros de Falabella. Tienes más control, y más responsabilidad operaciónal.</div>

  `
},
{
  tag:'Paso 2 de 6',

    <div class="mc"><div class="mc-ico"></div><div class="mc-t">En ruta</div><div class="mc-d">Salio en camion hacia el cliente final.</div></div>
    <div class="mc"><div class="mc-ico"></div><div class="mc-t">Completado</div><div class="mc-d">Entregado. Foto + hora exacta disponible.</div></div>
  </div>
  <div class="sec-lbl">Sobre las etiquetas</div>
  <ul class="cklist">
    <li>Falabella GENERA automáticamente la etiqueta con guia de Recibelo embebida</li>
    <li>Tu descargars la etiqueta desde Seller Center en seccion Ordenes > Descargar Etiqueta</li>

    <li>Recibelo retira desde el domicilio del cliente al dia siguiente</li>
    <li>El flujo es: En almacen (logística inversa) → En devolucion → Devuelto a tu bodega</li>
  </ul>
  `
},
{
  tag:'Paso 3 de 6',
  icon:'',
  title:'La regla de oro: el SLA de 1 hora',
  sub:'Esta es la regla mas importante del modelo. Si la cumples bien, mantendras una calificación alta y acceso a todos los beneficios. Si falla, el modelo puede desactivarse.',

    <div class="bs">Desde el corte de ventas hasta que Recibelo retira en tu bodega</div>

  <div class="alert alert-a">

// ─── WIZARD STATE ──────────────────────────────────────────────────────────

let currentWizard = 'nuevo';
let currentStep   = 0;

function getSteps() {
  return currentWizard === 'nuevo' ? STEPS_NUEVO : STEPS_CAMBIO;
}

function switchWizard(w) {
  currentWizard = w;
  currentStep   = 0;
  document.getElementById('tab-nuevo').classList.toggle('active', w === 'nuevo');
  document.getElementById('tab-cambio').classList.toggle('active', w === 'cambio');
  render();
}

function changeStep(dir) {
  const steps = getSteps();
  const next  = currentStep + dir;
  if (next < 0 || next >= steps.length) return;
  currentStep = next;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToStep(i) {
  currentStep = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const steps = getSteps();
  const step  = steps[currentStep];
  const total = steps.length;
  const pct   = Math.round(((currentStep + 1) / total) * 100);

  // Progress
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent  = 'Paso ' + (currentStep + 1) + ' de ' + total;

  // Sidebar
  const names_nuevo = [
    'Que es Falabella Directo','El modelo dia a dia','La regla de 1 hora',
    'FPLUS y beneficios','API y Tecnología','Activación en Seller Center'
  ];
  const names_cambio = ['Por que migrar','Que cambia','Como iniciar'];
  const names = currentWizard === 'nuevo' ? names_nuevo : names_cambio;
  document.getElementById('sidebar').innerHTML =
    '<div class="sidebar-ttl">' + (currentWizard === 'nuevo' ? 'Nuevo seller' : 'Cambio de courier') + '</div>' +
    names.map((n, i) => {
      const cls = i < currentStep ? 'snav done' : i === currentStep ? 'snav active' : 'snav';
      const num = i < currentStep ? '' : (i + 1);
      return '<div class="' + cls + '" onclick="goToStep(' + i + ')"><div class="snum">' + num + '</div><div class="slabel">' + n + '</div></div>';
    }).join('');

  // Step content
  document.getElementById('step-area').innerHTML =
    '<div class="scard"><span class="sico">' + step.icon + '</span><span class="stag">' + step.tag + '</span>' +
    '<h2 class="stitle">' + step.title + '</h2><p class="ssub">' + step.sub + '</p>' +
    step.html + '</div>';

  // Nav
  document.getElementById('btn-prev').disabled  = currentStep === 0;
  document.getElementById('btn-next').disabled  = currentStep === total - 1;
  document.getElementById('nav-info').textContent = (currentStep + 1) + ' / ' + total;

  if (currentStep === total - 1) {
    document.getElementById('btn-next').textContent = 'Finalizado';
    document.getElementById('btn-next').style.background = 'var(--purple)';
  } else {
    document.getElementById('btn-next').textContent = 'Siguiente';
    document.getElementById('btn-next').style.background = 'var(--green)';
  }
}

render();
</script>
