<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recíbelo · Plataforma Interna</title>
<style>
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#20243a;--border:#2a2d3e;
  --text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;
  --azul:#3b82f6;--verde:#22c55e;--rojo:#ef4444;--amarillo:#f59e0b;
  --orange:#FF6B35;--violeta:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;text-align:center}
.login-box img{height:36px;margin-bottom:24px}
.login-box h2{font-size:18px;font-weight:700;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:28px}
.btn-login{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:background .15s}
.btn-login:hover{background:#2a2d3e}
.btn-login svg{width:18px;height:18px;flex-shrink:0}
#login-error{margin-top:14px;font-size:12px;color:var(--rojo);min-height:16px}

/* ── APP ── */
#app{display:none;flex-direction:column;flex:1}

/* ── HEADER ── */
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-left img{height:28px}
.badge{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.user-chip{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition:background .15s;font-size:13px;color:var(--text)}
.user-chip:hover{background:var(--card2)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}

/* ── MAIN CONTENT ── */
.home-content{flex:1;padding:48px 32px;max-width:1100px;width:100%;margin:0 auto}
.home-title{font-size:22px;font-weight:700;margin-bottom:6px}
.home-sub{font-size:14px;color:var(--muted);margin-bottom:36px}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.mod-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:12px;transition:all .18s;cursor:pointer;position:relative;overflow:hidden}
.mod-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent-color)}
.mod-card:hover{border-color:var(--accent-color);background:var(--card2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.mod-card-icon{font-size:28px;line-height:1}
.mod-card-label{font-size:15px;font-weight:700}
.mod-card-desc{font-size:12px;color:var(--muted);line-height:1.5}
.mod-card-arrow{font-size:18px;color:var(--muted2);margin-top:auto;align-self:flex-end;transition:transform .18s}
.mod-card:hover .mod-card-arrow{transform:translateX(4px)}

/* ── RECURSOS ── */
.recursos-section{margin-top:48px}
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px}
.rec-grid{display:flex;gap:12px;flex-wrap:wrap}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 20px;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;transition:all .15s}
.rec-card:hover{border-color:var(--verde);background:var(--card2)}
.rec-ext{font-size:11px;opacity:.5;margin-left:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <img src="/recibelo.cl2.png" alt="Recíbelo">
    <h2>Plataforma Interna</h2>
    <p>Inicia sesión para acceder a tus módulos</p>
    <button class="btn-login" onclick="window.fbSignInMS()">
      <svg viewBox="0 0 21 21" fill="none"><rect width="10" height="10" fill="#F35325"/><rect x="11" width="10" height="10" fill="#81BC06"/><rect y="11" width="10" height="10" fill="#05A6F0"/><rect x="11" y="11" width="10" height="10" fill="#FFBA08"/></svg>
      Entrar con cuenta Recíbelo
    </button>
    <button class="btn-login" onclick="window.fbSignInGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar con Google
    </button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-left">
      <img src="/recibelo.cl2.png" alt="Recíbelo">
      <span class="badge">PLATAFORMA</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="weather-strip-home" style="display:none"></div>
      <div class="user-chip" onclick="window.doSignOut && window.doSignOut()">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-name">—</span>
        <span style="font-size:11px;color:var(--muted)">· salir</span>
      </div>
    </div>
  </header>

  <div class="home-content">
    <div class="home-title">Bienvenido a la plataforma</div>
    <div class="home-sub">Selecciona el módulo al que quieres acceder</div>
    <div class="cards-grid" id="cards-grid"></div>

    <div class="recursos-section">
      <div class="sec-label">Recursos</div>
      <div class="rec-grid">
        <a href="/falabella/" target="_blank" rel="noopener" class="rec-card">🟢 Falabella Directo <span class="rec-ext">↗</span></a>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { setupAuth, auth } from "/shared/auth.js";

const MODULES = [
  { modulo:"controller",      role:"controller",      icon:"📋", label:"Controller",       url:"/controller/",     color:"#FF6B35", desc:"Auditoría documental · Procesos L1–L4"         },
  { modulo:"asistencia_ruta", role:"asistencia_ruta", icon:"🚚", label:"Asistencia Ruta",  url:"/asistencia_ruta", color:"#3b82f6", desc:"Monitor de rutas en tiempo real · ETA y alertas"},
  { modulo:"operacional",     role:"operacional",     icon:"⚙️",  label:"Operacional",      url:"/operacional",     color:"#8b5cf6", desc:"Liquidaciones · Bonos · Primera Milla"          },
  { modulo:"finanzas",        role:"finanzas",        icon:"💰", label:"Finanzas",          url:"/finanzas",        color:"#22c55e", desc:"Facturación · Cobros · Cierre de mes"           },
  { modulo:"sla",             role:"sla",             icon:"📊", label:"SLA CX",            url:"/sla",             color:"#f59e0b", desc:"Efectividad de entregas · Análisis diario"      },
  { modulo:"incidencias",     role:"incidencias",     icon:"📋", label:"Incidencias",       url:"/incidencias",     color:"#ef4444", desc:"Dashboard de incidencias por área"              },
  { modulo:"retiros",         role:"retiros",         icon:"🚛", label:"Retiros",           url:"/retiros",         color:"#06b6d4", desc:"Seguimiento de retiros · Flotas y KPIs"         },
  { modulo:"growth",          role:"growth",          icon:"📈", label:"Growth",             url:"/growth",          color:"#a855f7", desc:"Seguimiento de clientes · Tiers y canales"      },
];

const _ROL = {
  controller:      r => r.includes("controller")||r.includes("admin"),
  asistencia_ruta: r => r.includes("asistencia_ruta")||r.includes("controller")||r.includes("admin"),
  operacional:     r => r.includes("operacional")||r.includes("admin"),
  finanzas:        r => r.includes("finanzas")||r.includes("admin"),
  sla:             r => r.includes("sla")||r.includes("controller")||r.includes("admin"),
  incidencias:     r => r.includes("incidencias")||r.includes("controller")||r.includes("admin"),
  retiros:         r => r.includes("retiros")||r.includes("controller")||r.includes("admin"),
  growth:          r => r.includes("growth")||r.includes("controller")||r.includes("admin"),
};

setupAuth({
  modulo: "home",
  onReady: async (user, roles) => {
    const grid = document.getElementById("cards-grid");
    const accessible = MODULES.filter(m => _ROL[m.role] && _ROL[m.role](roles));
    if (accessible.length === 0) {
      grid.innerHTML = '<p style="color:var(--muted);font-size:14px">No tienes módulos asignados. Contacta a tu administrador.</p>';
      return;
    }
    grid.innerHTML = accessible.map(m => `
      <a href="${m.url}" class="mod-card" style="--accent-color:${m.color}">
        <div class="mod-card-icon">${m.icon}</div>
        <div class="mod-card-label">${m.label}</div>
        <div class="mod-card-desc">${m.desc}</div>
        <div class="mod-card-arrow">→</div>
      </a>
    `).join("");
  }
});

// Login con Microsoft — import dinámico para evitar conflicto con singleton de auth.js
window.fbSignInMS = async function() {
  const err = document.getElementById("login-error");
  if (err) err.textContent = "";
  try {
    const { OAuthProvider, signInWithPopup } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
    const prov = new OAuthProvider("microsoft.com");
    prov.setCustomParameters({ tenant: "recibelo.cl" });
    await signInWithPopup(auth, prov);
  } catch(e) { if (err) err.textContent = e.message; }
};
